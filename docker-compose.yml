version: "3.9"

# =============================================================================
# platform-infra — Shared infrastructure stack
#
# All services use container_name: platform-{service} so that any project
# on the same Docker host can reach them by stable DNS name over the shared
# network (platform-infra_default).
#
# Ports use non-standard values so this stack can coexist with Cue's private
# stack during migration. After migration you can optionally update to
# standard ports in .env.
#
# Usage:
#   make up        — start all services
#   make down      — stop all services
#   make provision PROJECT=cue — terraform provision a project namespace
# =============================================================================

x-restart: &restart
  restart: unless-stopped

# wal-g env shared across the two Postgres services. Per-server WALG_S3_PREFIX
# is set inline on each service so each cluster gets its own bucket prefix.
x-walg-env: &walg-env
  AWS_ACCESS_KEY_ID: ${PLATFORM_MINIO_ROOT_USER:?PLATFORM_MINIO_ROOT_USER required}
  AWS_SECRET_ACCESS_KEY: ${PLATFORM_MINIO_ROOT_PASSWORD:?PLATFORM_MINIO_ROOT_PASSWORD required}
  AWS_ENDPOINT: http://platform-minio:9000
  AWS_REGION: us-east-1                # MinIO ignores this but wal-g requires it
  AWS_S3_FORCE_PATH_STYLE: "true"
  WALG_COMPRESSION_METHOD: brotli

# postgres command-line args that enable WAL archiving + PITR. Reused across
# both Postgres services via YAML anchor. archive_timeout=60s bounds RPO at
# 60s on idle clusters; under write load WAL flushes much more frequently.
x-pg-wal-command: &pg-wal-command
  - postgres
  - -c
  - archive_mode=on
  - -c
  - archive_command=wal-g wal-push %p
  - -c
  - archive_timeout=60s
  - -c
  - wal_level=replica
  - -c
  - max_wal_senders=3
  - -c
  - restore_command=wal-g wal-fetch %f %p

networks:
  # Explicit name — projects reference this as an external network
  platform:
    name: platform-infra_default
    driver: bridge

# ---------------------------------------------------------------------------
# Volumes
# ---------------------------------------------------------------------------
volumes:
  platform_postgres_data:
  platform_keycloak_postgres_data:
  platform_redis_data:
  platform_minio_data:
  platform_jaeger_data:
  platform_prometheus_data:
  platform_grafana_data:
  platform_alertmanager_data:
  platform_caddy_data:
  platform_caddy_config:

services:

  # ── PostgreSQL 16 + pgvector + wal-g ────────────────────────────────────────
  # Image is built from services/postgres/ — pgvector/pgvector:pg16 plus the
  # wal-g binary and a weekly base-backup cron. archive_command pushes every
  # flushed WAL segment to MinIO under the WALG_S3_PREFIX below.
  platform-postgres:
    build:
      context: ./services/postgres
    image: platform-postgres:latest
    container_name: platform-postgres
    <<: *restart
    networks: [platform]
    environment:
      <<: *walg-env
      POSTGRES_USER: ${PLATFORM_PG_SUPERUSER:?PLATFORM_PG_SUPERUSER required}
      POSTGRES_PASSWORD: ${PLATFORM_PG_SUPERPASSWORD:?PLATFORM_PG_SUPERPASSWORD required}
      POSTGRES_DB: postgres
      WALG_S3_PREFIX: s3://${BACKUP_BUCKET:-platform-backups}/wal-g/platform-postgres
    command: *pg-wal-command
    ports:
      - "${PLATFORM_PG_PORT:-5433}:5432"
    volumes:
      - platform_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PLATFORM_PG_SUPERUSER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Keycloak PostgreSQL + wal-g ─────────────────────────────────────────────
  platform-keycloak-postgres:
    build:
      context: ./services/postgres
    image: platform-postgres:latest
    container_name: platform-keycloak-postgres
    <<: *restart
    networks: [platform]
    environment:
      <<: *walg-env
      POSTGRES_DB: keycloak
      POSTGRES_USER: ${PLATFORM_KC_DB_USER:?PLATFORM_KC_DB_USER required}
      POSTGRES_PASSWORD: ${PLATFORM_KC_DB_PASSWORD:?PLATFORM_KC_DB_PASSWORD required}
      WALG_S3_PREFIX: s3://${BACKUP_BUCKET:-platform-backups}/wal-g/platform-keycloak-postgres
    command: *pg-wal-command
    volumes:
      - platform_keycloak_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PLATFORM_KC_DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Keycloak 26 ─────────────────────────────────────────────────────────────
  # No realm is baked in — realms are managed by Terraform (one realm per project)
  platform-keycloak:
    build:
      context: ./infra/keycloak
      dockerfile: Dockerfile
    image: platform-keycloak:latest
    container_name: platform-keycloak
    <<: *restart
    networks: [platform]
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://platform-keycloak-postgres:5432/keycloak
      KC_DB_USERNAME: ${PLATFORM_KC_DB_USER:?PLATFORM_KC_DB_USER required}
      KC_DB_PASSWORD: ${PLATFORM_KC_DB_PASSWORD:?PLATFORM_KC_DB_PASSWORD required}
      KC_HOSTNAME: ${PLATFORM_KC_PUBLIC_URL:?PLATFORM_KC_PUBLIC_URL required}
      # Strict by default in prod; flip to "false" in dev .env when running on LAN IP.
      KC_HOSTNAME_STRICT: ${PLATFORM_KC_HOSTNAME_STRICT:-true}
      KC_HTTP_ENABLED: "true"
      KC_PROXY: edge
      KC_BOOTSTRAP_ADMIN_USERNAME: ${PLATFORM_KC_ADMIN_USER:?PLATFORM_KC_ADMIN_USER required}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${PLATFORM_KC_ADMIN_PASSWORD:?PLATFORM_KC_ADMIN_PASSWORD required}
    ports:
      - "${PLATFORM_KC_PORT:-8081}:8080"
    depends_on:
      platform-keycloak-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/9000 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && grep -iq 'HTTP/1.1 200' <&3"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ── Redis 7 ─────────────────────────────────────────────────────────────────
  # DB 0 = reserved, DB 1 = LiteLLM semantic cache, DB 2+ = project namespaces
  # Password required — every connecting project must include the password in
  # its REDIS_URL (redis://:<password>@platform-redis:6379/<db>).
  platform-redis:
    image: redis@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99   # redis:7-alpine
    container_name: platform-redis
    <<: *restart
    networks: [platform]
    environment:
      PLATFORM_REDIS_PASSWORD: ${PLATFORM_REDIS_PASSWORD:?PLATFORM_REDIS_PASSWORD required}
    ports:
      - "${PLATFORM_REDIS_PORT:-6380}:6379"
    volumes:
      - platform_redis_data:/data
    command:
      - sh
      - -c
      - exec redis-server --databases 16 --appendonly yes --requirepass "$$PLATFORM_REDIS_PASSWORD"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$PLATFORM_REDIS_PASSWORD\" --no-auth-warning ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO ────────────────────────────────────────────────────────────────────
  platform-minio:
    image: minio/minio@sha256:14cea493d9a34af32f524e538b8346cf79f3321eff8e708c1e2960462bd8936e   # minio:latest as of 2026-06-09
    container_name: platform-minio
    <<: *restart
    networks: [platform]
    environment:
      MINIO_ROOT_USER: ${PLATFORM_MINIO_ROOT_USER:?PLATFORM_MINIO_ROOT_USER required}
      MINIO_ROOT_PASSWORD: ${PLATFORM_MINIO_ROOT_PASSWORD:?PLATFORM_MINIO_ROOT_PASSWORD required}
    ports:
      - "${PLATFORM_MINIO_PORT:-9002}:9000"
      - "${PLATFORM_MINIO_CONSOLE_PORT:-9003}:9001"
    volumes:
      - platform_minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── LiteLLM Proxy ────────────────────────────────────────────────────────────
  # master_key enables virtual key management (one key per project with budgets)
  # Image digest captured 2026-06-09 from main-latest. Bump in the same commit
  # as any LiteLLM behavior change so the running tag and source match.
  platform-litellm:
    image: ghcr.io/berriai/litellm@sha256:7c311546c25e7bb6e8cafede9fcd3d0d622ac636b5c9418befaa32e85dfb0186
    container_name: platform-litellm
    <<: *restart
    networks: [platform]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: ["--config", "/app/config.yaml", "--host", "0.0.0.0", "--port", "4000", "--num_workers", "4"]
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      LLM_FAST_MODEL: ${LLM_FAST_MODEL:-openai/gpt-4o-mini}
      LLM_BALANCED_MODEL: ${LLM_BALANCED_MODEL:-openai/gpt-4o-mini}
      LLM_EMBEDDING_MODEL: ${LLM_EMBEDDING_MODEL:-openai/text-embedding-3-small}
      VOICE_TRANSCRIPT_MODEL: ${VOICE_TRANSCRIPT_MODEL:-openai/whisper-1}
      LLM_VISION_MODEL: ${LLM_VISION_MODEL:-openai/gpt-4o-mini}
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:?LITELLM_MASTER_KEY required}
      LITELLM_DATABASE_URL: ${LITELLM_DATABASE_URL:?LITELLM_DATABASE_URL required}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://platform-otel-collector:4317
      OTEL_SERVICE_NAME: platform-litellm
    ports:
      - "${PLATFORM_LITELLM_PORT:-4001}:4000"
    volumes:
      - ./infra/litellm/litellm_config.yaml:/app/config.yaml:ro
    depends_on:
      platform-redis:
        condition: service_healthy
      platform-postgres:
        condition: service_healthy

  # ── Platform MCP ─────────────────────────────────────────────────────────────
  # General-purpose tool server: email, SMS, web search, nearby places, transcription
  # Secrets are written to services/mcp/.env by Terraform (terraform apply -target=null_resource.mcp_deploy)
  platform-mcp:
    build:
      context: ./services/mcp
    image: platform-mcp:latest
    container_name: platform-mcp
    <<: *restart
    networks: [platform]
    env_file:
      - path: ./services/mcp/.env
        required: false
    environment:
      MCP_API_KEY: ${MCP_API_KEY:?MCP_API_KEY required}
      # Email, SMS, and search are required for production — fail fast if missing.
      # In dev, set these to empty strings via .env if you want to skip the check.
      SMTP_HOST: ${SMTP_HOST:?SMTP_HOST required (set to empty string to disable)}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:?SMTP_USER required (set to empty string to disable)}
      SMTP_PASSWORD: ${SMTP_PASSWORD:?SMTP_PASSWORD required (set to empty string to disable)}
      SMTP_FROM: ${SMTP_FROM:?SMTP_FROM required}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:?TWILIO_ACCOUNT_SID required (set to empty string to disable)}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:?TWILIO_AUTH_TOKEN required (set to empty string to disable)}
      TWILIO_PHONE_NUMBER: ${TWILIO_PHONE_NUMBER:?TWILIO_PHONE_NUMBER required (set to empty string to disable)}
      TAVILY_API_KEY: ${TAVILY_API_KEY:?TAVILY_API_KEY required (set to empty string to disable)}
      LITELLM_PROXY_URL: http://platform-litellm:4000
      LITELLM_API_KEY: ${LITELLM_API_KEY:-}
    ports:
      - "${PLATFORM_MCP_PORT:-8010}:8000"
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 15s
      timeout: 5s
      retries: 3
    depends_on:
      platform-litellm:
        condition: service_started

  # ── OpenTelemetry Collector ──────────────────────────────────────────────────
  platform-otel-collector:
    image: otel/opentelemetry-collector-contrib@sha256:cea61bd39d318b3ec7664794f6be9ed0cce9321059a08b4ec5d3b8d310a4b609   # 0.100.0
    container_name: platform-otel-collector
    <<: *restart
    networks: [platform]
    command: ["--config=/etc/otel/collector-config.yaml"]
    volumes:
      - ./infra/otel/collector-config.yaml:/etc/otel/collector-config.yaml:ro
    ports:
      - "${PLATFORM_OTEL_GRPC_PORT:-4319}:4317"
      - "${PLATFORM_OTEL_HTTP_PORT:-4320}:4318"
      - "${PLATFORM_OTEL_METRICS_PORT:-8890}:8889"
    depends_on:
      - platform-jaeger

  # ── Jaeger ───────────────────────────────────────────────────────────────────
  platform-jaeger:
    image: jaegertracing/all-in-one@sha256:8f165334f418ca53691ce358c19b4244226ed35c5d18408c5acf305af2065fb9   # 1.57
    container_name: platform-jaeger
    <<: *restart
    user: "0"   # root — required so Jaeger can create badger dirs in named volume
    networks: [platform]
    environment:
      SPAN_STORAGE_TYPE: badger
      BADGER_EPHEMERAL: "false"
      BADGER_DIRECTORY_VALUE: /badger/data
      BADGER_DIRECTORY_KEY: /badger/key
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "${PLATFORM_JAEGER_UI_PORT:-16687}:16686"
      - "14250:14250"   # internal only — gRPC intake from otel-collector
    volumes:
      - platform_jaeger_data:/badger

  # ── Prometheus ───────────────────────────────────────────────────────────────
  platform-prometheus:
    image: prom/prometheus@sha256:5c435642ca4d8427ca26f4901c11114023004709037880cd7860d5b7176aa731   # v2.52.0
    container_name: platform-prometheus
    <<: *restart
    networks: [platform]
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--storage.tsdb.retention.size=5GB"
      - "--web.enable-lifecycle"
    ports:
      - "${PLATFORM_PROMETHEUS_PORT:-9091}:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/prometheus/rules:/etc/prometheus/rules:ro
      - platform_prometheus_data:/prometheus
    depends_on:
      - platform-otel-collector

  # ── Grafana ──────────────────────────────────────────────────────────────────
  platform-grafana:
    image: grafana/grafana@sha256:7d5faae481a4c6f436c99e98af11534f7fd5e8d3e35213552dd1dd02bc393d2e   # 10.4.2
    container_name: platform-grafana
    <<: *restart
    networks: [platform]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${PLATFORM_GRAFANA_ADMIN_PASSWORD:?PLATFORM_GRAFANA_ADMIN_PASSWORD required}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    ports:
      - "${PLATFORM_GRAFANA_PORT:-3002}:3000"
    volumes:
      - platform_grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      # dashboards.yaml provisioning expects JSONs at /var/lib/grafana/dashboards.
      # The named volume above covers /var/lib/grafana writeable state; this
      # bind-mount provides the readonly dashboard JSONs Grafana auto-loads.
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - platform-prometheus

  # ── Alertmanager ─────────────────────────────────────────────────────────────
  # Fans Prometheus alerts out to email (Resend SMTP) for warnings and
  # email+SMS (Twilio via webhook) for critical signals. See
  # infra/alertmanager/alertmanager.yml + ALERTING_RUNBOOK.md.
  platform-alertmanager:
    # Built from services/alertmanager/ — prom/alertmanager:v0.27.0 + a tiny
    # envsubst shim that renders alertmanager.yml.tmpl → alertmanager.yml at
    # startup. Upstream alertmanager doesn't expand ${VAR} in its config
    # (prometheus/alertmanager#3108) so we do it ourselves.
    build:
      context: ./services/alertmanager
    image: platform-alertmanager:latest
    container_name: platform-alertmanager
    <<: *restart
    networks: [platform]
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
      - "--web.external-url=http://platform-alertmanager:9093"
    environment:
      # Resend SMTP creds — alertmanager template substitutes these via
      # envsubst at startup. Same SMTP_* vars MCP already uses, so a single
      # Resend account covers user mail and ops alerts.
      SMTP_HOST: ${SMTP_HOST:-smtp.resend.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:?SMTP_USER required (Resend api key user)}
      SMTP_PASSWORD: ${SMTP_PASSWORD:?SMTP_PASSWORD required (Resend api key)}
      SMTP_FROM: ${SMTP_FROM:?SMTP_FROM required (verified sender on your Resend domain)}
      ALERTS_TO_EMAIL: ${ALERTS_TO_EMAIL:?ALERTS_TO_EMAIL required (on-call distribution list)}
      # Optional SMS bridge — leave blank to disable SMS. Operator wires this
      # to platform-mcp or a tiny Twilio sidecar; see ALERTING_RUNBOOK.md.
      ALERTS_SMS_WEBHOOK_URL: ${ALERTS_SMS_WEBHOOK_URL:-}
    ports:
      - "${PLATFORM_ALERTMANAGER_PORT:-9094}:9093"
    volumes:
      # Template — entrypoint renders to alertmanager.yml via envsubst.
      - ./infra/alertmanager/alertmanager.yml.tmpl:/etc/alertmanager/alertmanager.yml.tmpl:ro
      - platform_alertmanager_data:/alertmanager

  # ── Postgres exporter (platform-postgres) ────────────────────────────────────
  postgres-exporter-platform:
    image: quay.io/prometheuscommunity/postgres-exporter:v0.15.0   # TODO(week-3): pin by digest
    container_name: postgres-exporter-platform
    <<: *restart
    networks: [platform]
    environment:
      DATA_SOURCE_NAME: postgresql://${PLATFORM_PG_SUPERUSER:?}:${PLATFORM_PG_SUPERPASSWORD:?}@platform-postgres:5432/postgres?sslmode=disable
      PG_EXPORTER_INCLUDE_DATABASES: "cue,litellm,postgres"
    depends_on:
      platform-postgres:
        condition: service_healthy

  # ── Postgres exporter (platform-keycloak-postgres) ───────────────────────────
  postgres-exporter-keycloak:
    image: quay.io/prometheuscommunity/postgres-exporter:v0.15.0   # TODO(week-3): pin by digest
    container_name: postgres-exporter-keycloak
    <<: *restart
    networks: [platform]
    environment:
      DATA_SOURCE_NAME: postgresql://${PLATFORM_KC_DB_USER:?}:${PLATFORM_KC_DB_PASSWORD:?}@platform-keycloak-postgres:5432/keycloak?sslmode=disable
      PG_EXPORTER_INCLUDE_DATABASES: "keycloak"
    depends_on:
      platform-keycloak-postgres:
        condition: service_healthy

  # ── Redis exporter ───────────────────────────────────────────────────────────
  redis-exporter:
    image: oliver006/redis_exporter:v1.61.0   # TODO(week-3): pin by digest
    container_name: redis-exporter
    <<: *restart
    networks: [platform]
    environment:
      REDIS_ADDR: redis://platform-redis:6379
      REDIS_PASSWORD: ${PLATFORM_REDIS_PASSWORD:?PLATFORM_REDIS_PASSWORD required}
      # Surface XINFO STREAM metrics so DLQ depth + consumer lag alerts work.
      # Stream keys: stream:ingest, stream:decompose, stream:draft, stream:research,
      # stream:route, stream:ws:push, stream:images, stream:geo (8 streams).
      REDIS_EXPORTER_CHECK_STREAMS: "stream:ingest,stream:decompose,stream:draft,stream:research,stream:route,stream:ws:push,stream:images,stream:geo,stream:ingest:dead,stream:decompose:dead,stream:draft:dead,stream:research:dead,stream:route:dead,stream:ws:push:dead,stream:images:dead,stream:geo:dead"
    depends_on:
      platform-redis:
        condition: service_healthy

  # ── cAdvisor — container metrics including OOM kills ────────────────────────
  # Needs docker socket + /sys + /var/lib/docker mounts; runs as root so it
  # can read cgroup stats for every container on the host.
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1   # TODO(week-3): pin by digest
    container_name: cadvisor
    <<: *restart
    networks: [platform]
    privileged: true
    command:
      - "--housekeeping_interval=30s"
      - "--docker_only=true"
      - "--store_container_labels=false"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro

  # ── Caddy ────────────────────────────────────────────────────────────────────
  # Routes are dynamically loaded from infra/caddy/routes/*.caddy
  # Each project gets one file (written by Terraform)
  platform-caddy:
    image: caddy@sha256:86deaf5e3d3408a6ccec08fbb79989783dd26e206ae10bcf78a801dc8c9ab794   # 2-alpine
    container_name: platform-caddy
    <<: *restart
    networks: [platform]
    environment:
      DOMAIN: ${DOMAIN:?DOMAIN required}
      CADDY_OBS_USER: ${CADDY_OBS_USER:?CADDY_OBS_USER required}
      CADDY_OBS_PASSWORD_HASH: ${CADDY_OBS_PASSWORD_HASH:?CADDY_OBS_PASSWORD_HASH required}
    ports:
      - "${PLATFORM_CADDY_HTTP_PORT:-80}:80"
      - "${PLATFORM_CADDY_HTTPS_PORT:-443}:443"
      - "${PLATFORM_CADDY_HTTPS_PORT:-443}:443/udp"   # HTTP/3
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./infra/caddy/routes:/etc/caddy/routes:ro
      - platform_caddy_data:/data
      - platform_caddy_config:/config

  # ── Platform Backup ──────────────────────────────────────────────────────────
  # Nightly pg_dump → MinIO via mc pipe. Bucket platform-backups, prefix
  # postgres/{server}/{db}/{ts}.dump. 7-day retention enforced by MinIO ILM.
  # See services/backup/ and BACKUP_RUNBOOK.md.
  platform-backup:
    build:
      context: ./services/backup
    image: platform-backup:latest
    container_name: platform-backup
    <<: *restart
    networks: [platform]
    environment:
      PLATFORM_PG_SUPERUSER: ${PLATFORM_PG_SUPERUSER:?PLATFORM_PG_SUPERUSER required}
      PLATFORM_PG_SUPERPASSWORD: ${PLATFORM_PG_SUPERPASSWORD:?PLATFORM_PG_SUPERPASSWORD required}
      PLATFORM_KC_DB_USER: ${PLATFORM_KC_DB_USER:?PLATFORM_KC_DB_USER required}
      PLATFORM_KC_DB_PASSWORD: ${PLATFORM_KC_DB_PASSWORD:?PLATFORM_KC_DB_PASSWORD required}
      PLATFORM_MINIO_ROOT_USER: ${PLATFORM_MINIO_ROOT_USER:?PLATFORM_MINIO_ROOT_USER required}
      PLATFORM_MINIO_ROOT_PASSWORD: ${PLATFORM_MINIO_ROOT_PASSWORD:?PLATFORM_MINIO_ROOT_PASSWORD required}
      BACKUP_BUCKET: ${BACKUP_BUCKET:-platform-backups}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-7}
      BACKUP_RUN_ON_START: ${BACKUP_RUN_ON_START:-true}
      MINIO_URL: http://platform-minio:9000
      TZ: UTC
    depends_on:
      platform-postgres:
        condition: service_healthy
      platform-keycloak-postgres:
