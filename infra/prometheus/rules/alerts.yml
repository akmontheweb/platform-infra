# Alert rules for the eight + WAL critical signals from
# PRODUCTION_LAUNCH_PLAN.md §4. The naming convention is
# severity = critical | warning, service = api | streams | db | redis |
# minio | host so Alertmanager can route on labels.
#
# Tune the thresholds for your traffic. Numbers chosen here are reasonable
# starting points at zero-user / pre-launch scale.
groups:
  # ─────────────────────────────────────────────────────────────────────
  # 1. Cue API — 5xx rate
  # ─────────────────────────────────────────────────────────────────────
  - name: api
    rules:
      - alert: APIHighErrorRate
        expr: |
          sum(rate(http_server_duration_count{http_status_code=~"5.."}[5m]))
            /
          sum(rate(http_server_duration_count[5m]))
            > 0.02
        for: 5m
        labels:
          severity: critical
          service: api
        annotations:
          summary: "Cue API 5xx rate > 2% (5m)"
          description: |
            5xx error rate for {{ $labels.job }} is {{ $value | humanizePercentage }}
            over the last 5 minutes. Investigate via Grafana "API Health" dashboard
            or `make logs-api` in the Cue repo.

  # ─────────────────────────────────────────────────────────────────────
  # 2-3. Redis Streams — DLQ depth + consumer lag
  # ─────────────────────────────────────────────────────────────────────
  - name: streams
    rules:
      - alert: DLQNonEmpty
        expr: redis_stream_length{stream=~".*:dead"} > 0
        for: 5m
        labels:
          severity: warning
          service: streams
        annotations:
          summary: "DLQ {{ $labels.stream }} has {{ $value }} message(s)"
          description: |
            A consumer group failed to process a message past MAX_RETRIES=3.
            Replay or discard via `/admin/dlq/*` after investigating the
            failure mode. See Cue ARCHITECTURE.md §6 for the stream pipeline.

      - alert: StreamConsumerLagHigh
        expr: redis_stream_group_messages_pending > 100
        for: 10m
        labels:
          severity: warning
          service: streams
        annotations:
          summary: "Stream {{ $labels.stream }} / group {{ $labels.group }} has {{ $value }} pending"
          description: |
            Consumer pending-entries-list (PEL) is growing — workers are
            either slow or stuck. Check ai-orchestrator logs for the agent
            tied to this stream. Pipeline order:
            ingest → decompose → draft → research → route → ws:push.

      - alert: StreamConsumerLagCritical
        expr: redis_stream_group_messages_pending > 1000
        for: 5m
        labels:
          severity: critical
          service: streams
        annotations:
          summary: "Stream {{ $labels.stream }} / group {{ $labels.group }} backlog > 1000"
          description: |
            Pipeline backpressure is significant. Likely an agent crash loop
            or LiteLLM saturation. Triage immediately.

  # ─────────────────────────────────────────────────────────────────────
  # 4. Postgres — connection saturation
  # ─────────────────────────────────────────────────────────────────────
  - name: postgres-connections
    rules:
      - alert: PostgresHighConnections
        expr: |
          sum by (cluster) (pg_stat_activity_count)
            /
          on(cluster) group_left pg_settings_max_connections
            > 0.8
        for: 5m
        labels:
          severity: warning
          service: db
        annotations:
          summary: "Postgres {{ $labels.cluster }} > 80% of max_connections"
          description: |
            Connection pool likely saturating. Inspect long-running queries
            and check Cue API connection-pool size (api .env: PG_POOL_SIZE).

      - alert: PostgresConnectionsCritical
        expr: |
          sum by (cluster) (pg_stat_activity_count)
            /
          on(cluster) group_left pg_settings_max_connections
            > 0.95
        for: 1m
        labels:
          severity: critical
          service: db
        annotations:
          summary: "Postgres {{ $labels.cluster }} > 95% of max_connections"
          description: |
            New connections will start failing imminently. Cull idle
            connections or raise max_connections temporarily.

  # ─────────────────────────────────────────────────────────────────────
  # 5. Postgres — free disk on the data volume
  # cAdvisor surfaces container filesystem usage. For named volumes,
  # the labels are container `name` and filesystem `device`.
  # ─────────────────────────────────────────────────────────────────────
  - name: postgres-disk
    rules:
      - alert: PostgresDiskHigh
        expr: |
          (container_fs_usage_bytes{name=~"platform.*postgres"}
              /
           container_fs_limit_bytes{name=~"platform.*postgres"})
            > 0.85
        for: 10m
        labels:
          severity: warning
          service: db
        annotations:
          summary: "Postgres {{ $labels.name }} disk > 85%"
          description: |
            WAL backlog from a failing archive_command can rapidly fill
            this. Check `make wal-status` for `failed_count > 0` BEFORE
            touching postgres.

      - alert: PostgresDiskCritical
        expr: |
          (container_fs_usage_bytes{name=~"platform.*postgres"}
              /
           container_fs_limit_bytes{name=~"platform.*postgres"})
            > 0.95
        for: 2m
        labels:
          severity: critical
          service: db
        annotations:
          summary: "Postgres {{ $labels.name }} disk > 95% — imminent FAIL"
          description: |
            If this hits 100%, postgres will halt writes. Page on-call NOW.

  # ─────────────────────────────────────────────────────────────────────
  # 6. MinIO — free disk (backup destination)
  # ─────────────────────────────────────────────────────────────────────
  - name: minio
    rules:
      - alert: MinIOLowFreeSpace
        expr: |
          (minio_node_disk_free_bytes
              /
           (minio_node_disk_free_bytes + minio_node_disk_used_bytes))
            < 0.15
        for: 15m
        labels:
          severity: warning
          service: minio
        annotations:
          summary: "MinIO node {{ $labels.server }} < 15% free"
          description: |
            Backups live here. If this fills, both pg_dump → mc pipe and
            wal-g archive_command will fail. Bump retention down or expand
            the volume.

  # ─────────────────────────────────────────────────────────────────────
  # 7. Redis — memory pressure
  # If maxmemory is set, alert on used/max ratio. If not set,
  # cAdvisor's container_memory_usage_bytes is the fallback.
  # ─────────────────────────────────────────────────────────────────────
  - name: redis
    rules:
      - alert: RedisMemoryHigh
        # Falls back gracefully: if redis_memory_max_bytes == 0 (unset),
        # the division yields +Inf and the alert won't fire spuriously
        # because the condition compares >0.85, so +Inf > 0.85 is true.
        # Better to guard with the cAdvisor-side rule below as a backstop.
        expr: |
          redis_memory_max_bytes > 0
            and
          (redis_memory_used_bytes / redis_memory_max_bytes) > 0.85
        for: 10m
        labels:
          severity: warning
          service: redis
        annotations:
          summary: "Redis using > 85% of maxmemory"
          description: |
            Eviction or OOM is imminent. Check `make shell-redis` →
            INFO memory and DBSIZE per DB.

      - alert: RedisContainerMemoryHigh
        expr: |
          container_memory_usage_bytes{name="platform-redis"}
            /
          container_spec_memory_limit_bytes{name="platform-redis"}
            > 0.85
        for: 10m
        labels:
          severity: warning
          service: redis
        annotations:
          summary: "Redis container memory > 85% of cgroup limit"
          description: |
            Fallback alert when Redis maxmemory is unset. Container will
            be OOM-killed soon.

  # ─────────────────────────────────────────────────────────────────────
  # 8. Container OOM kills (cAdvisor)
  # ─────────────────────────────────────────────────────────────────────
  - name: host
    rules:
      - alert: ContainerOOMKilled
        expr: increase(container_oom_events_total{name!=""}[5m]) > 0
        for: 0m
        labels:
          severity: critical
          service: host
        annotations:
          summary: "Container {{ $labels.name }} OOM-killed"
          description: |
            kernel OOM killer terminated this container. Raise memory limit
            or fix the leak. Mostly affects platform-postgres or LLM workers.

  # ─────────────────────────────────────────────────────────────────────
  # 9. WAL archiver — pg_stat_archiver failures
  # ─────────────────────────────────────────────────────────────────────
  - name: wal
    rules:
      - alert: WALArchiveFailing
        expr: increase(pg_stat_archiver_failed_count[10m]) > 0
        for: 0m
        labels:
          severity: critical
          service: db
        annotations:
          summary: "Postgres {{ $labels.cluster }} archive_command failing"
          description: |
            WAL segments are not reaching MinIO. WAL piles up on the data
            volume and PITR coverage is broken. FIX MINIO FIRST — DO NOT
            restart postgres until archived_count starts climbing again.
            See platform-infra/BACKUP_RUNBOOK.md §7.

      - alert: WALArchiveStale
        # last_archive_age > 5m on an idle cluster is normal (archive_timeout=60s
        # forces a flush, so anything > 5m means archiving is hung).
        expr: pg_stat_archiver_last_archive_age > 300
        for: 5m
        labels:
          severity: warning
          service: db
        annotations:
          summary: "Postgres {{ $labels.cluster }} last archive > 5m ago"
          description: |
            archive_timeout=60s should keep this < 60s. > 5m suggests
            archive_command is silently broken even if failed_count is 0.

  # ─────────────────────────────────────────────────────────────────────
  # 10. Backup cron stale — placeholder rule
  # Needs a metric source (last successful backup timestamp). Options:
  #   - backup.sh sets a Redis key, redis_exporter exposes via CHECK_KEYS
  #   - backup.sh pushes to a Pushgateway (would require adding the service)
  # Until then, rely on platform-backup container restart-count + a manual
  # `make backup-list | tail -1` morning check. See ALERTING_RUNBOOK.md.
  # ─────────────────────────────────────────────────────────────────────
  - name: backup
    rules: []
