global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # ── OTel Collector (exposes all project metrics via /metrics) ─
  - job_name: otel-collector
    static_configs:
      - targets: ["platform-otel-collector:8889"]

  # ── Prometheus self-scrape ────────────────────────────────────
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # ── Jaeger internal metrics ───────────────────────────────────
  - job_name: jaeger
    static_configs:
      - targets: ["platform-jaeger:14269"]
    metrics_path: /metrics
